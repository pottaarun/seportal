name = "seportal-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "seportal-db"
database_id = "77da92f7-e197-4d6e-bef1-1567ff404afa"

# KV namespace binding
[[kv_namespaces]]
binding = "KV"
id = "66a4c597ef8749b99263134606222f5a"

# R2 bucket binding
[[r2_buckets]]
binding = "R2"
bucket_name = "seportal-storage"

# Workers AI binding (used for Whisper transcription + bge-base-en-v1.5 embeddings)
[ai]
binding = "AI"

# Vectorize binding for Cloudflare documentation (RFx generator)
[[vectorize]]
binding = "VECTORIZE"
index_name = "cloudflare-docs"

# Vectorize binding for Learning Hub video transcripts (semantic search + recommendations)
# Create with: wrangler vectorize create seportal-videos --dimensions=768 --metric=cosine
[[vectorize]]
binding = "VIDEO_VECTORIZE"
index_name = "seportal-videos"

# Queue producer: the RFx docs indexer enqueues one message per docs page.
# Create with: `wrangler queues create seportal-docs-ingest`
[[queues.producers]]
binding = "DOCS_QUEUE"
queue = "seportal-docs-ingest"

# Queue consumer: this same Worker processes the docs pages in the background.
# Conservative batch/concurrency keeps us well under Workers AI + subrequest limits
# while ~8,000 pages are crawled, embedded (bge-base-en-v1.5) and upserted to Vectorize.
[[queues.consumers]]
queue = "seportal-docs-ingest"
max_batch_size = 4       # pages processed per invocation
max_batch_timeout = 30   # seconds to wait to fill a batch
max_retries = 3          # transient failures (429/5xx) retry with backoff...
dead_letter_queue = "seportal-docs-ingest-dlq"  # ...then land here instead of vanishing
max_concurrency = 2      # cap parallel invocations to throttle embedding calls

# Dead-letter consumer: pages that exhaust all retries land here. We don't
# re-process them; we log + count them (KV `docs:dlq:last`) so failures are
# observable via doc-stats instead of silently dropped.
[[queues.consumers]]
queue = "seportal-docs-ingest-dlq"
max_batch_size = 20
max_batch_timeout = 10
max_retries = 0          # never retry a dead-letter (avoid loops)

# Public Cloudflare account ID (safe to commit).
# The Stream API token is set as a secret: `wrangler secret put STREAM_API_TOKEN`
[vars]
CLOUDFLARE_ACCOUNT_ID = "181a2fdc5974aca05e555ae1dd7c080b"

# Cron trigger for weekly documentation updates
[triggers]
crons = ["0 2 * * SUN"]  # Every Sunday at 2:00 AM UTC — re-seeds the full docs crawl
